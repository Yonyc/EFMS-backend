version: '3.8'

networks:
  efms-network:
    driver: bridge

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: efms-postgres
    networks:
      efms-network:
        aliases:
          - postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME:-efms_db}
      POSTGRES_USER: ${DB_USER:-efms}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-efms} -d ${DB_NAME:-efms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  efms:
    image: efms-backend:latest
    container_name: efms-app
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - efms-network
    environment:
      DB_HOST: postgres-db
      DB_NAME: ${DB_NAME:-efms_db}
      DB_USER: ${DB_USER:-efms}
      DB_PASS: ${DB_PASS}
      DB_URL: jdbc:postgresql://postgres-db:5432/${DB_NAME:-efms_db}
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: