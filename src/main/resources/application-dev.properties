spring.application.name=efms

# H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:efmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Quote all identifiers to avoid reserved-word conflicts (e.g. columns named `user` or `value`)
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Enable H2 console (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console